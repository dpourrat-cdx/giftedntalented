sonar.projectKey=dpourrat-cdx_giftedntalented
sonar.organization=dpourrat-cdxgiftedntalented

# Sources
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,backend/dist/**,backend/coverage/**,**/*.test.ts,**/*.test.js

# Coverage (lcov generated by vitest --coverage)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.test.js,**/test/**,backend/scripts/**,**/*.config.ts,**/*.config.js,**/frontend-tests/**,frame-bust.js,gamification.js,question-bank.js,scoreboard.js

# Language hints
sonar.javascript.file.suffixes=.js
sonar.typescript.file.suffixes=.ts
