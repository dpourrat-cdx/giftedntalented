services:
  - type: web
    name: giftedntalented-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGINS
        value: https://dpourrat-cdx.github.io
      - key: ADMIN_API_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_CLIENT_EMAIL
        sync: false
      - key: FCM_PRIVATE_KEY
        sync: false
