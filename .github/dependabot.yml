version: 2

updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      typescript-types:
        patterns:
          - "@types/*"
    ignore:
      - dependency-name: express
        update-types: ["version-update:semver-major"]
      - dependency-name: zod
        update-types: ["version-update:semver-major"]
