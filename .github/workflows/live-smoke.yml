name: Live Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: live-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-smoke:
    name: Live Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      BACKEND_BASE_URL: https://giftedntalented.onrender.com/api/v1
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY GitHub secrets."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run live smoke test
        run: npm run smoke:live

      - name: Open or update smoke failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Live smoke workflow failure";
            const body = [
              "The scheduled or manually triggered live smoke workflow failed.",
              "",
              `- Workflow: ${context.workflow}`,
              `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `- Ref: ${context.ref}`,
              `- Trigger: ${context.eventName}`,
              `- Commit: ${context.sha}`,
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "all",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              if (existing.state === "closed") {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  state: "open",
                });
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

