name: Claude PR Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    # Only review Codex PRs from this repo after CI succeeds
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      startsWith(github.event.workflow_run.head_branch, 'codex/') &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 8 --model claude-sonnet-4-6"
          prompt: |
            You are Claude reviewing a Codex PR for the Captain Nova project.
            Start your review comment with "Codex, " so it is clear who posted it.

            Review checklist (from CONTRIBUTING.md):
            1. CI — Backend and SonarCloud gates both passed (this review only runs after CI succeeds).
            2. Tests — all new service logic has unit tests in *.test.ts; no real Supabase/Firebase imports in tests.
            3. Coverage — new-code coverage ≥80%; any temporary exclusions are documented in doc/backlog.md.
            4. Sonar — 0 new issues; if any are deferred, they must be noted in doc/backlog.md and the PR description.
            5. Shared files — check that the PR does not touch files currently owned by an open Claude PR
               (attempt.service.ts, question-bank.ts, question-bank.data.json, admin-auth.ts, supabase/*.sql, doc/backlog.md).
            6. Correctness — challenge assumptions, look for regressions, missing edge cases, and security concerns.
            7. Docs — if the PR changes API routes, schema, or the reset/hosting model, verify the relevant docs are updated.

            If all checks pass: approve the PR with a short summary of what was verified.
            If issues are found: request changes with specific, actionable feedback per finding.
            Never rubber-stamp — CI is already confirmed green by the time this runs.
